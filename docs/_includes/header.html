<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Required meta tags -->
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	
	<!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
	
	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<!-- link to main stylesheet -->
	<link rel="stylesheet" type="text/css" href="/assets/css/main.css">
	
	<!-- icon -->
	<link rel="shortcut icon" type="image/png" 
      href="{{ "/assets/img/icon.png"  | absolute_url }}">

</head>

<body>
<header class="site-header px-responsive">
 <div style="background-color:#084594; background-image:url('{{ "/assets/img/bg1.png" | relative_url }}'); background-size: cover;">
  <div class="container">
    <br><br>
    <div class="header-grid">
      
      <!-- Logo (left) -->
      <div class="header-logo">
    	<a href="{{ "/" | relative_url }}">
      		<img src="{{ "/assets/img/logo.png" | relative_url }}"
           		alt="PinPath"
           		class="site-logo">
    	</a>
 	  </div>

      <!-- Navigation -->
      <nav class="header-nav">
        <ul style="list-style:none; padding:0; margin:0;">
          {% assign current = page.url | downcase | split: '/' %}

          <li class="d-inline-block px-3">
            <a class="nav-underline {% if page.url == '/' %}current{% endif %}"
               href="{{ '/' | relative_url }}"
               style="color:white; font-size:24px;"><b>Home</b></a>
          </li>

          <li class="d-inline-block px-3">
            <a class="nav-underline {% if page.url contains '/about' %}current{% endif %}"
               href="{{ '/about' | relative_url }}"
               style="color:white; font-size:24px;"><b>About</b></a>
          </li>
          
          <li class="d-inline-block px-3">
            <a class="nav-underline {% if page.url contains '/r-package' %}current{% endif %}"
               href="{{ '/r-package' | relative_url }}"
               style="color:white; font-size:24px;"><b>R package</b></a>
          </li>

          <li class="d-inline-block px-3">
            <a class="nav-underline {% if page.url contains '/web-app' %}current{% endif %}"
               href="https://019c28d6-11da-6eb9-2aeb-d79ddc76e85a.share.connect.posit.cloud/" target="_blank"
               style="color:white; font-size:24px;"><b>Web app</b></a>
          </li>

          <li class="d-inline-block px-3">
            <a class="nav-underline {% if page.url contains '/help' %}current{% endif %}"
               href="{{ '/help' | relative_url }}"
               style="color:white; font-size:24px;"><b>Help</b></a>
          </li>
        </ul>
      </nav>

      <!-- Spacer (right, empty) -->
      <div class="header-spacer"></div>

    </div>

    <br><br>
  </div>
</div>
</header>
</body>
